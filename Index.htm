<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Site de Notícias</title>
<style>
body{
font-family: Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#0a4cff;
color:white;
padding:15px;
text-align:center;
}

#news{
display:grid;
grid-template-columns:1fr;
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
font-size:18px;
}
</style>
</head>

<body>

<header>
<h1>Notícias do Dia</h1>
</header>

<div id="news"></div>

<script>
const apiKey = "SUA_API_AQUI";

fetch(`https://newsapi.org/v2/top-headlines?country=br&apiKey=${apiKey}`)
.then(res => res.json())
.then(data => {

let noticias = document.getElementById("news");

data.articles.forEach(n => {

noticias.innerHTML += `
<div class="card">
<img src="${n.urlToImage}">
<h3>${n.title}</h3>
<p>${n.description}</p>
</div>
`;

});

});
</script>

</body>
</html>
