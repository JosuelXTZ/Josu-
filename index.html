<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos de Futebol Ao Vivo</title>

<style>

body{
font-family: Arial;
margin:0;
background:#0b3d91;
color:white;
}

header{
background:white;
color:#0b3d91;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

#jogos{
padding:15px;
}

.jogo{
background:white;
color:black;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.times{
display:flex;
justify-content:space-between;
font-weight:bold;
font-size:18px;
}

.info{
text-align:center;
margin-top:8px;
}

.status{
text-align:center;
font-weight:bold;
margin-top:5px;
}

.ao-vivo{
color:red;
}

</style>
</head>

<body>

<header>⚽ Futebol Ao Vivo</header>

<div id="jogos">Carregando jogos...</div>

<script>

async function carregarJogos(){

let url="https://site.api.espn.com/apis/v2/sports/soccer/scoreboard";

let resposta=await fetch(url);
let dados=await resposta.json();

let container=document.getElementById("jogos");
container.innerHTML="";

dados.events.forEach(jogo=>{

let comp=jogo.competitions[0];

let casa=comp.competitors[0];
let fora=comp.competitors[1];

let nomeCasa=casa.team.displayName;
let nomeFora=fora.team.displayName;

let placarCasa=casa.score || "0";
let placarFora=fora.score || "0";

let status=jogo.status.type.description;

let classe="status";

if(status.includes("Live")){
classe="status ao-vivo";
status="🔴 AO VIVO";
}

container.innerHTML+=`

<div class="jogo">

<div class="times">
<span>${nomeCasa}</span>
<span>${nomeFora}</span>
</div>

<div class="info">
${placarCasa} x ${placarFora}
</div>

<div class="${classe}">
${status}
</div>

</div>

`;

});

}

carregarJogos();

setInterval(carregarJogos,60000);

</script>

</body>
</html>
