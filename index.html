<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JM Notícias</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef3ff;
}

header{
background:#0b5cff;
color:white;
padding:25px;
text-align:center;
}

#noticias{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h2{
padding:10px;
font-size:20px;
}

.card p{
padding:0 10px 10px;
color:#555;
}

</style>

</head>

<body>

<header>
<h1>JM Notícias</h1>
<p>Portal de notícias</p>
</header>

<div id="noticias"></div>

<script>

let noticias = [

{
titulo:"Tecnologia cresce no Brasil",
texto:"Cada vez mais jovens estão aprendendo programação e criando sites e aplicativos.",
imagem:"https://picsum.photos/400/200?1"
},

{
titulo:"Internet abre novas oportunidades",
texto:"Trabalhos online estão se tornando comuns em todo o mundo.",
imagem:"https://picsum.photos/400/200?2"
},

{
titulo:"Celulares cada vez mais poderosos",
texto:"Novos smartphones chegam com inteligência artificial e mais velocidade.",
imagem:"https://picsum.photos/400/200?3"
},

{
titulo:"Educação online cresce",
texto:"Cursos pela internet ajudam pessoas a aprender novas profissões.",
imagem:"https://picsum.photos/400/200?4"
}

];

let area=document.getElementById("noticias");

noticias.forEach(n=>{

area.innerHTML += `

<div class="card">

<img src="${n.imagem}">

<h2>${n.titulo}</h2>

<p>${n.texto}</p>

</div>

`;

});

</script>

</body>
</html>
