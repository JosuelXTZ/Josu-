<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portal de Notícias</title>

<style>

body{
font-family: Arial;
background:#0b3d91;
margin:0;
color:white;
}

header{
background:#072c66;
padding:20px;
text-align:center;
font-size:28px;
}

#news{
padding:20px;
}

.card{
background:white;
color:black;
border-radius:10px;
padding:15px;
margin-bottom:15px;
}

.card a{
color:#0b3d91;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<header>
📰 Portal de Notícias
</header>

<div id="news">
Carregando notícias...
</div>

<script>

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://g1.globo.com/rss/g1/")
.then(response => response.json())
.then(data => {

let noticias="";

data.items.slice(0,10).forEach(item => {

noticias += `
<div class="card">
<h3>${item.title}</h3>
<p>${item.pubDate}</p>
<a href="${item.link}" target="_blank">Ler notícia</a>
</div>
`;

});

document.getElementById("news").innerHTML = noticias;

})
.catch(() => {
document.getElementById("news").innerHTML = "Erro ao carregar notícias.";
});

</script>

</body>
</html>
