<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Notícias do G1</title>

<style>
body{
font-family:Arial;
background:#0b3d91;
margin:0;
color:white;
}

header{
background:#072c66;
padding:20px;
text-align:center;
font-size:28px;
}

#news{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
color:black;
border-radius:10px;
padding:15px;
}

.card a{
color:#0b3d91;
font-weight:bold;
text-decoration:none;
}
</style>
</head>

<body>

<header>
📰 Notícias do G1
</header>

<div id="news">Carregando notícias...</div>

<script>

async function carregarNoticias(){

let rss="https://api.allorigins.win/get?url=" +
encodeURIComponent("https://g1.globo.com/rss/g1/");

let resposta=await fetch(rss);
let dados=await resposta.json();

let parser=new DOMParser();
let xml=parser.parseFromString(dados.contents,"text/xml");

let itens=xml.querySelectorAll("item");

let html="";

itens.forEach((item,i)=>{

if(i<12){

let titulo=item.querySelector("title").textContent;
let link=item.querySelector("link").textContent;

html+=`
<div class="card">
<h3>${titulo}</h3>
<a href="${link}" target="_blank">Ler no G1</a>
</div>
`;

}

});

document.getElementById("news").innerHTML=html;

}

carregarNoticias();

</script>

</body>
</html>
