<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Josuel Notícias</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f7ff;
}

header{
background:#1e5eff;
color:white;
padding:20px;
text-align:center;
font-size:32px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.card-content a{
text-decoration:none;
color:#1e5eff;
font-weight:bold;
}

footer{
background:#1e5eff;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
Josuel Notícias
</header>

<div class="container">

<div class="grid" id="news"></div>

</div>

<footer>
Portal criado por Josuel
</footer>

<script>

const feed="https://api.rss2json.com/v1/api.json?rss_url=https://www.reuters.com/rssFeed/worldNews"

fetch(feed)
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("news")

data.items.slice(0,24).forEach(noticia=>{

let img=noticia.thumbnail || "https://picsum.photos/400/200"

container.innerHTML+=`

<div class="card">

<img src="${img}">

<div class="card-content">

<a href="${noticia.link}" target="_blank">
${noticia.title}
</a>

</div>

</div>

`

})

})

</script>

</body>
</html>
